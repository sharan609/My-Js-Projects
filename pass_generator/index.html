<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password-Generator</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <h1>Genarate a<br><span>Random Password</span></h1>
        <div class="display">
            <input type="text" id="password" placeholder="Password" readonly>
            <img src="copy.png" onclick="copyPassword()" >
        </div>
        <button onclick="createPassword()"><img src="generate.png"> Genarate Password</button>
    </div>
    
<script>
    
   const passwordBox= document.getElementById("password");
   const length=12;
   const upperCase="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
   const lowerCse="abcdefghijklmnopqrstuvwxyz";
   const numbers="0123456789";
   const symbols="@#$%^&*()_+~|}{[]></-=";
   const allChars =upperCase + lowerCse + numbers + symbols;
   
   function createPassword(){
    let password= "";
    password += upperCase[Math.floor(Math.random()*upperCase.length)];
    password += lowerCse[Math.floor(Math.random()*lowerCse.length)];
    password += numbers[Math.floor(Math.random()*numbers.length)];
    password += symbols[Math.floor(Math.random()*symbols.length)];
    
     while(length>password.length){
     password += allChars[Math.floor(Math.random()*allChars.length)];
     }

      passwordBox.value=password;
   }
    
   function copyPassword(){
    navigator.clipboard.writeText(passwordBox.value);
   }

</script>

</body>
</html>
